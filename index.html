<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LinguaLens" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Learn Chinese with AI — translation, pronunciation, immersive reading and more." />
  <title>LinguaLens — Learn Chinese</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>中</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    html, body, #root {
      height: 100%;
    }
    /* Prevent iOS double-tap zoom on buttons */
    button { touch-action: manipulation; }
    /* Prevent iOS input zoom (font-size >= 16px) */
    input, textarea, select { font-size: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function(){var t=localStorage.getItem('lingualens_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
